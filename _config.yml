root: /
# 设置root目录
# permalink: :year/:month/:day/:title/
#permalink: posts/:category/:title.html
permalink: posts/:title.html
permalink_defaults:

#Custom Setting Start

# Site settings
SEOTitle: 山间草夫
header-img: img/home-bg.jpg
email: meetsong@foxmail.com
#description: ""
keyword: "xxxxxxxx"


# SNS settings
# RSS: false
weibo_username:     #
zhihu_username:     #
github_username:    jeesk
twitter_username:   #
facebook_username:  #
linkedin_username:  #

# Build settings
anchorjs: true                          # if you want to customize anchor. check out line:181 of `post.html`


# Disqus settings
disqus_username: hexo-theme-huxblog

# Duoshuo settings
# duoshuo_username: kaijun
# Share component is depend on Comment so we can NOT use share only.
duoshuo_share: true                     # set to false if you want to use Comment without Sharing


# Analytics settings
# Baidu Analytics
ba_track_id: 4cc1f2d8f3067386cc5cdb626a202900
# Google Analytics
ga_track_id: 'UA-49627206-1'            # Format: UA-xxxxxx-xx
ga_domain: huangxuan.me


# Sidebar settings
sidebar: true                           # whether or not using Sidebar.
sidebar-about-description: "我要成为魔法师!"
sidebar-avatar: img/avatar.jpeg      # use absolute URL, seeing it's used in both `/` and `/about/`


# Featured Tags
featured-tags: true                     # whether or not using Feature-Tags
featured-condition-size: 1              # A tag will be featured if the size of it is more than this condition value


