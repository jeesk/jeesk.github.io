ass="line">            ch = readch();  </span><br><span class="line">            <span class="built_in">printf</span>(<span class="string">"you hit %c\n"</span>,ch);  </span><br><span class="line">        &#125;  </span><br><span class="line">    &#125;  </span><br><span class="line">    close_keyboard();  </span><br><span class="line">    <span class="built_in">exit</span>(0);  </span><br><span class="line">    <span class="built_in">return</span> 0;  </span><br><span class="line">&#125;  </span><br><span class="line">  </span><br><span class="line">void init_keyboard()  </span><br><span class="line">&#123;  </span><br><span class="line">    tcgetattr(0,&amp;initial_settings);  </span><br><span class="line">    new_settings = initial_settings;  </span><br><span class="line">    new_settings.c_lflag &amp;= ~ICANON;  </span><br><span class="line">    new_settings.c_lflag &amp;= ~ECHO;  </span><br><span class="line">    new_settings.c_lflag &amp;= ~ISIG;  </span><br><span class="line">    new_settings.c_cc[VMIN] = 1;  </span><br><span class="line">    new_settings.c_cc[VTIME] = 0;  </span><br><span class="line">    tcsetattr(0, TCSANOW, &amp;new_settings);  </span><br><span class="line">&#125;  </span><br><span class="line">void close_keyboard()  </span><br><span class="line">&#123;  </span><br><span class="line">    tcsetattr(0, TCSANOW, &amp;initial_settings);  </span><br><span class="line">&#125;  </span><br><span class="line">  </span><br><span class="line">int kbhit()  </span><br><span class="line">&#123;  </span><br><span class="line">    char ch;  </span><br><span class="line">    int nread;  </span><br><span class="line">    <span class="keyword">if</span>(peek_character != -1)  </span><br><span class="line">        <span class="built_in">return</span> 1;  </span><br><span class="line">    new_settings.c_cc[VMIN]=0;  </span><br><span class="line">    tcsetattr(0, TCSANOW, &amp;new_settings);  </span><br><span class="line">    nread = <span class="built_in">read</span>(0,&amp;ch,1);  </span><br><span class="line">    new_settings.c_cc[VMIN]=1;  </span><br><span class="line">    tcsetattr(0, TCSANOW, &amp;new_settings);  </span><br><span class="line"><span class="keyword">if</span>(nread == 1) &#123;  </span><br><span class="line">      peek_character = ch;  </span><br><span class="line">      <span class="built_in">return</span> 1;  </span><br><span class="line">&#125;  </span><br><span class="line"><span class="built_in">return</span> 0;  </span><br><span class="line">&#125;  </span><br><span class="line">  </span><br><span class="line">int readch()  </span><br><span class="line">&#123;  </span><br><span class="line">    char ch;  </span><br><span class="line">    <span class="keyword">if</span>(peek_character != -1) &#123;  </span><br><span class="line">        ch = peek_character;  </span><br><span class="line">        peek_character = -1;  </span><br><span class="line">        <span class="built_in">return</span> ch;  </span><br><span class="line">    &#125;  </span><br><span class="line">    <span class="built_in">read</span>(0,&amp;ch,1);  </span><br><span class="line">    <span class="built_in">return</span> ch;  </span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

ss="params">(<span class="keyword">void</span>)</span>  </span></span><br><span class="line"><span class="function"></span>&#123;  </span><br><span class="line"><span class="class"><span class="keyword">struct</span> <span class="title">termios</span> <span class="title">oldt</span>, <span class="title">newt</span>;</span>  </span><br><span class="line"><span class="keyword">int</span> ch;  </span><br><span class="line"><span class="keyword">int</span> oldf;  </span><br><span class="line">tcgetattr(STDIN_FILENO, &amp;oldt);  </span><br><span class="line">newt = oldt;  </span><br><span class="line">newt.c_lflag &amp;= ~(ICANON | ECHO);  </span><br><span class="line">tcsetattr(STDIN_FILENO, TCSANOW, &amp;newt);  </span><br><span class="line">oldf = fcntl(STDIN_FILENO, F_GETFL, <span class="number">0</span>);  </span><br><span class="line">fcntl(STDIN_FILENO, F_SETFL, oldf | O_NONBLOCK);  </span><br><span class="line">ch = getchar();  </span><br><span class="line">tcsetattr(STDIN_FILENO, TCSANOW, &amp;oldt);  </span><br><span class="line">fcntl(STDIN_FILENO, F_SETFL, oldf);  </span><br><span class="line"><span class="keyword">if</span>(ch != EOF)  </span><br><span class="line">&#123;  </span><br><span class="line">ungetc(ch, <span class="built_in">stdin</span>);  </span><br><span class="line"><span class="keyword">return</span> <span class="number">1</span>;  </span><br><span class="line">&#125;  </span><br><span class="line"><span class="keyword">return</span> <span class="number">0</span>;  </span><br><span class="line">&#125;  </span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">main</span><span class="params">(<span class="keyword">void</span>)</span>  </span></span><br><span class="line"><span class="function"></span>&#123;  </span><br><span class="line"><span class="keyword">while</span>(!kbhit())  </span><br><span class="line"><span class="built_in">puts</span>(<span class="string">"Press a key!"</span>);  </s     // only load tagcloud.js in tag.html
    if($('#tag_cloud').length !== 0){
        async("http://jeesk.github.io/js/jquery.tagcloud.js",function(){
            $.fn.tagcloud.defaults = {
                //size: {start: 1, end: 1, unit: 'em'},
                color: {start: '#bbbbee', end: '#0085a1'},
            };
            $('#tag_cloud a').tagcloud();
        })
    }
</script>
